server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression (Brotli requires a custom module/image)
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # CSP in Report-Only mode — allows Leaflet, Esri tiles, and CDN scripts.
    # Move to enforcement once violations are reviewed and dependencies are
    # optionally self-hosted for a stricter policy.
    add_header Content-Security-Policy-Report-Only
        "default-src 'self'; "
        "script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; "
        "style-src 'self' 'unsafe-inline' https://unpkg.com; "
        "img-src 'self' data: https://server.arcgisonline.com https://*.arcgisonline.com; "
        "connect-src 'self' https://server.arcgisonline.com https://*.arcgisonline.com; "
        "font-src 'self'; "
        "worker-src 'self' blob:; "
        "report-uri /csp-report" always;

    # index.html: revalidate always (no caching of the entry point)
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Versioned assets (e.g. app.js?v=20260713a): cache for 1 year
    # The ?v= query param changes when content changes, so caching is safe
    location ~* \.(js|css|svg|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Fallback to index.html for any unmatched route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
